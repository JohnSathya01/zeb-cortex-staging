<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex — Moved</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background image — same treatment as the loader */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url('./bg.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.13;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      width: 100%;
      padding: 32px 16px;
      animation: fadeIn 0.5s ease-out;
    }

    /* ── Brand ── */
    .brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .brand-name {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.8px;
      color: #1a1a1a;
    }

    .brand-sub {
      font-size: 12px;
      color: #565b73;
      letter-spacing: 0.5px;
    }

    .brand-sub span {
      font-weight: 700;
      color: #1a1a1a;
    }

    /* ── Zeb mark (same as AppLoader) ── */
    .zeb-mark {
      width: 44px;
      height: 44px;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: drop-shadow(0 0 3px rgba(181,212,79,0.25)); transform: scale(1); }
      50%       { filter: drop-shadow(0 0 10px rgba(181,212,79,0.65)); transform: scale(1.05); }
    }

    /* ── Card ── */
    .card {
      background: rgba(255, 255, 255, 0.90);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 20px;
      padding: 48px 44px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    .card-icon {
      width: 56px;
      height: 56px;
      background: #f0f4e8;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
    }

    .card-icon svg {
      width: 28px;
      height: 28px;
      stroke: #7aab2a;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #1a1a1a;
      letter-spacing: -0.4px;
      margin-bottom: 12px;
    }

    .subtitle {
      font-size: 15px;
      color: #565b73;
      line-height: 1.65;
      margin-bottom: 6px;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: #c4e04e;
      border-radius: 99px;
      margin: 20px auto;
    }

    .contact {
      font-size: 14px;
      color: #8b91a8;
    }

    .contact a {
      color: #1a1a1a;
      font-weight: 700;
      text-decoration: none;
      border-bottom: 2px solid #c4e04e;
      padding-bottom: 1px;
      transition: color 0.15s;
    }

    .contact a:hover { color: #5a8a00; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="page">

    <!-- Brand -->
    <div class="brand">
      <svg class="zeb-mark" viewBox="0 0 46 46" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M23,3 L7,39 Q4,45 10,45 L30,45 Z" fill="#3c3c3c"/>
        <path d="M23,3 L30,45 L37,45 Q43,45 40,39 Z" fill="#c4e04e"/>
        <path d="M23,3 L27,15 L19,15 Z" fill="#555555" opacity="0.75"/>
      </svg>
      <div class="brand-name">Cortex</div>
      <div class="brand-sub">powered by <span>zeb</span></div>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-icon">
        <!-- Arrow right / moved icon -->
        <svg viewBox="0 0 24 24">
          <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
        </svg>
      </div>

      <h1>This page has moved</h1>
      <p class="subtitle">Sorry for the inconvenience.<br/>Cortex has a new home — please update your bookmark.</p>
      <div class="divider"></div>
      <p class="contact">Need help? <a href="mailto:admin@zeblearn.com">Reach the admin</a></p>
    </div>

  </div>
</body>
</html>
