<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex — Moved</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
    }
    .icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }
    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .contact {
      margin-top: 24px;
      font-size: 14px;
      color: #94a3b8;
    }
    .contact a {
      color: #3b82f6;
      text-decoration: none;
      font-weight: 600;
    }
    .contact a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📦</div>
    <h1>This page has moved</h1>
    <p>Sorry for the inconvenience.</p>
    <p>Cortex has a new home — please update your bookmark.</p>
    <div class="contact">
      Need help? <a href="mailto:admin@zeblearn.com">Reach the admin</a>
    </div>
  </div>
</body>
</html>
